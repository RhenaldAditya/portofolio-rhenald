<!-- Mendefinisikan bahwa dokumen ini adalah HTML5 -->
<!DOCTYPE html>
<!-- Tag utama HTML, atribut lang="id" berarti menggunakan bahasa Indonesia -->
<html lang="id">
<head>
    <!-- Pengaturan karakter standar agar bisa membaca semua huruf/simbol -->
    <meta charset="UTF-8">
    <!-- Membuat website responsif (menyesuaikan ukuran layar HP atau Laptop) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Judul yang muncul di tab browser -->
    <title>Portfolio | Rhenald Aditya Bima Permana</title>
    <!-- Menghubungkan file HTML ini dengan file CSS untuk desain -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container utama yang membungkus semua isi website -->
    <div class="container">
        
        <!-- Bagian header untuk menampilkan profil utama -->
        <header class="profile-header">
            <!-- Menampilkan salam yang nanti akan diubah oleh JavaScript -->
            <h2 id="greeting">Halo!</h2>
            <!-- Nama lengkapmu dengan heading 1 (paling besar) -->
            <h1>Rhenald Aditya Bima Permana</h1>
            <!-- Deskripsi singkat -->
            <p>Web Developer | Programmer</p>
        </header>

        <!-- Bagian utama untuk menampilkan tombol-tombol sosial media -->
        <main class="social-links">
            <!-- Tautan ke Instagram (target="_blank" agar membuka tab baru saat diklik) -->
            <a href="https://instagram.com/rhenaldadityaa" target="_blank" class="btn">
                Instagram: @rhenaldadityaa
            </a>
            
            <!-- Tautan ke LinkedIn -->
            <a href="https://www.linkedin.com/in/rhenald-aditya-bima-p-248053204/" target="_blank" class="btn">
                LinkedIn: Rhenald Aditya Bima P
            </a>
            
            <!-- Tautan ke YouTube -->
            <a href="https://youtube.com/@rhenaldaditya" target="_blank" class="btn">
                YouTube: Rhenald Aditya
            </a>
            
            <!-- Tautan ke GitHub (Meskipun kamu menulis email, saya arahkan formatnya ke profil GitHub) -->
            <a href="https://github.com/RhenaldAditya" target="_blank" class="btn">
                GitHub: Rhenald Aditya
            </a>
        </main>
        
    </div>

    <!-- Menghubungkan file HTML ini dengan file JavaScript untuk interaktivitas -->
    <script src="script.js"></script>
</body>
</html>
